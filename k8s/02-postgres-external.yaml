# =============================================================================
# k8s/02-postgres-external.yaml
#
# Reemplaza el StatefulSet postgres interno (eliminado en Fase 2).
# Crea un Service sin selector; los Endpoints manuales (IPs de los nodos
# HAProxy del clúster PostgreSQL externo) los genera apply-manifests.sh a
# partir de PG_ENDPOINT_IPS del inventario (infra/environments/<env>.env).
#
# Después de aplicar, verificar:
#   kubectl get endpoints postgres -n aeisoftware
# =============================================================================
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: aeisoftware
  labels:
    app: postgres
    managed-by: saas-infra
  annotations:
    description: "Proxy al clúster PostgreSQL HA externo via HAProxy"
spec:
  # Sin selector — el tráfico va a los Endpoints manuales
  clusterIP: None
  ports:
    - name: primary      # HAProxy → Primary actual (RW directo)
      port: 5000
      targetPort: 5000
      protocol: TCP
    - name: replica      # HAProxy → Replicas (RO)
      port: 5001
      targetPort: 5001
      protocol: TCP
# (Endpoints generados por infra/apply-manifests.sh desde PG_ENDPOINT_IPS)
