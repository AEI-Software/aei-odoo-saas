version: '3.8'

services:
  # ========================================================
  # 1. Reverse Proxy (Traefik v3.6)
  # ========================================================
  traefik:
    image: traefik:v3.6.12
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    command:
      # Configuraciones base de API y Providers leídas de traefik.yml
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-public"
      # Rutas base TLS
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Integración Let's Encrypt (Tomado de: ssl@openeducat.com)
      - "--certificatesresolvers.letsencrypt.acme.email=ssl@openeducat.com" 
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--log.level=INFO"
      # Forward Headers para IPs (Como estaba en la config de traefik para bypass CF)
      - "--entrypoints.web.forwardedHeaders.trustedIPs=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32"
      - "--entrypoints.websecure.forwardedHeaders.trustedIPs=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/opt/odoo-saas/traefik/acme/acme.json:/letsencrypt/acme.json"
    networks:
      - traefik-public

  # ========================================================
  # 2. Database (PostgreSQL + PgVector)
  # ========================================================
  db:
    image: pgvector/pgvector:pg15
    container_name: odoo_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo_secure_password # <-- Actualiza esto con la contraseña original
      - POSTGRES_DB=postgres
    volumes:
      - /opt/odoo-saas/odoo_instance/data/pg_data:/var/lib/postgresql/data
    networks:
      - traefik-public

  # ========================================================
  # 3. Application (Odoo 19)
  # ========================================================
  odoo:
    image: odoo:19.0
    container_name: odoo_app
    depends_on:
      - db
    restart: unless-stopped
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo_secure_password # <-- Actualiza acorde a db
    volumes:
      # Modificaciones precisas basadas en el entorno ee8aaad1... detectado
      - /opt/odoo-saas/odoo_instance/data:/var/lib/odoo
      - /opt/odoo-saas/odoo_instance/addons:/mnt/extra-addons:ro
      - /opt/odoo-saas/odoo_instance/logs:/var/log/odoo
      # Descomenta la siguiente línea cuando tengas el odoo.conf real con los paths corregidos
      # - /opt/odoo-saas/odoo_instance/odoo.conf:/etc/odoo/odoo.conf:ro 
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # Router HTTPS principal
      - "traefik.http.routers.odoo-https.entrypoints=websecure"
      - "traefik.http.routers.odoo-https.rule=Host(`saas.midominio.com`)" # <-- Remplazar
      - "traefik.http.routers.odoo-https.tls=true"
      - "traefik.http.routers.odoo-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.odoo-https.loadbalancer.server.port=8069"
      # Redirección HTTP -> HTTPS
      - "traefik.http.routers.odoo-http.entrypoints=web"
      - "traefik.http.routers.odoo-http.rule=Host(`saas.midominio.com`)"
      - "traefik.http.middlewares.odoo-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.odoo-redirect.redirectscheme.permanent=true"
      - "traefik.http.routers.odoo-http.middlewares=odoo-redirect"
    networks:
      - traefik-public

  # ========================================================
  # 4. Monitoring (Netdata)
  # ========================================================
  netdata:
    image: netdata/netdata:stable
    container_name: netdata
    restart: unless-stopped
    pid: host
    network_mode: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  netdataconfig:
  netdatalib:
  netdatacache:

networks:
  traefik-public:
    external: false
